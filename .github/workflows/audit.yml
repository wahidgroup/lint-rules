name: Security Audit

on:
  schedule:
    - cron: "0 8 * * 1"
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Configure GitHub Packages Auth
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Setup
        run: make setup NPM_INSTALL_FLAGS=--ignore-scripts

      - name: Security Audit
        run: make audit
