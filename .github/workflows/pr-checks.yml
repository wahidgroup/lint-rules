name: PR Checks

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - labeled
      - unlabeled
      - assigned
      - unassigned
    branches: [main]

permissions:
  pull-requests: read

jobs:
  title:
    name: Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
          requireScope: false
          subjectPattern: ^.+[^.]$
          subjectPatternError: |
            Subject MUST NOT end with a period.
            Example: "feat(scope): add new feature"

  body:
    name: Body
    if: ${{ !startsWith(github.head_ref, 'process/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate required sections
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          required=("Summary" "Related Issues" "Changes Made" "Testing" "Breaking Changes")

          body=$(printf '%s' "$PR_BODY" | perl -0pe 's/<!--.*?-->//gs')

          missing=()
          empty=()

          for section in "${required[@]}"; do
            if ! printf '%s\n' "$body" | grep -qE "^##[[:space:]]+${section}[[:space:]]*$"; then
              missing+=("## ${section}")
              continue
            fi
            content=$(printf '%s\n' "$body" | awk -v hdr="${section}" '
              $0 ~ "^##[[:space:]]+"hdr"[[:space:]]*$" { capture=1; next }
              /^##[[:space:]]/ { capture=0 }
              capture { print }
            ' | sed -E 's/^[[:space:]]*[-*][[:space:]]*$//' | tr -d '[:space:]')
            if [ "${#content}" -lt 3 ]; then
              empty+=("## ${section}")
            fi
          done

          failed=0
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required sections:"
            printf '  - %s\n' "${missing[@]}"
            failed=1
          fi
          if [ "${#empty[@]}" -gt 0 ]; then
            echo "Empty required sections (must contain at least 3 non-whitespace chars):"
            printf '  - %s\n' "${empty[@]}"
            failed=1
          fi
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "See CONTRIBUTING.md for the PR body specification."
            exit 1
          fi
          echo "PR body OK."

  metadata:
    name: Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Validate assignee and label
        env:
          ASSIGNEES_JSON: ${{ toJSON(github.event.pull_request.assignees) }}
          LABELS_JSON: ${{ toJSON(github.event.pull_request.labels) }}
        run: |
          set -euo pipefail

          assignee_count=$(printf '%s' "$ASSIGNEES_JSON" | jq 'length')
          label_count=$(printf '%s' "$LABELS_JSON" | jq 'length')

          failed=0
          if [ "$assignee_count" -eq 0 ]; then
            echo "PR MUST have at least one assignee."
            failed=1
          fi
          if [ "$label_count" -eq 0 ]; then
            echo "PR MUST have at least one label."
            failed=1
          fi
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "See CONTRIBUTING.md for the PR requirements."
            exit 1
          fi
          echo "PR metadata OK: ${assignee_count} assignee(s), ${label_count} label(s)."
